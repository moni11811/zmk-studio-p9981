syntax = "proto3";

package zmk.combos;

import "zmk/keymap.proto";

message ComboSummary {
  uint32 id = 1;
  string name = 2;
  uint32 key_count = 3;
}

message ComboDetails {
  uint32 id = 1;
  string name = 2;
  repeated int32 key_positions = 3;
  zmk.keymap.BehaviorBinding binding = 4;
  int32 timeout_ms = 5;
  int32 require_prior_idle_ms = 6;
  bool slow_release = 7;
  uint32 layer_mask = 8;
}

// Request messages
message GetComboDetailsRequest {
  uint32 combo_id = 1;
}

message SetComboRequest {
  uint32 combo_id = 1;
  string name = 2;
  repeated int32 key_positions = 3;
  zmk.keymap.BehaviorBinding binding = 4;
  int32 timeout_ms = 5;
  int32 require_prior_idle_ms = 6;
  bool slow_release = 7;
  uint32 layer_mask = 8;
}

message DeleteComboRequest {
  uint32 combo_id = 1;
}

message Request {
  oneof request_type {
    bool list_all_combos = 1;
    GetComboDetailsRequest get_combo_details = 2;
    SetComboRequest set_combo = 3;
    bool create_combo = 4;
    DeleteComboRequest delete_combo = 5;
    bool save_changes = 6;
    bool discard_changes = 7;
    bool check_unsaved_changes = 8;
  }
}

// Response messages
message ListAllCombosResponse {
  repeated ComboSummary combos = 1;
}

enum SetComboResponseCode {
  SET_COMBO_OK = 0;
  SET_COMBO_ERR_INVALID_ID = 1;
  SET_COMBO_ERR_TOO_MANY_KEYS = 2;
  SET_COMBO_ERR_INVALID_BINDING = 3;
}

message CreateComboResponse {
  oneof result {
    uint32 ok = 1;
    bool err = 2;
  }
}

enum SaveChangesErrorCode {
  SAVE_CHANGES_OK = 0;
  SAVE_CHANGES_ERR_GENERIC = 1;
}

message Response {
  oneof response_type {
    ListAllCombosResponse list_all_combos = 1;
    ComboDetails get_combo_details = 2;
    SetComboResponseCode set_combo = 3;
    CreateComboResponse create_combo = 4;
    bool delete_combo = 5;
    SaveChangesErrorCode save_changes = 6;
    bool discard_changes = 7;
    bool check_unsaved_changes = 8;
  }
}

// Notifications
message Notification {
  oneof notification_type {
    bool unsaved_changes_status_changed = 1;
  }
}
